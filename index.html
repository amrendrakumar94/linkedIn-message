<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LinkedIn Message Copilot</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="container">
    <header class="header-row">
      <h1>LinkedIn Message Copilot</h1>
      <button type="button" id="themeToggleBtn" class="secondary-btn" aria-label="Toggle dark mode">🌙 Dark</button>
    </header>

    <p id="tabHint" class="hint">Open this popup on a LinkedIn tab.</p>

    <form id="messageForm">
      <label>
        Referrer name
        <input id="name" type="text" placeholder="e.g., Sarah" required />
      </label>

      <label>
        Role
        <input id="role" type="text" placeholder="e.g., Software Engineer" required />
      </label>

      <label>
        Job ID
        <input id="jobId" type="text" placeholder="e.g., 123456" required />
      </label>

      <label>
        Company
        <input id="company" type="text" placeholder="e.g., LinkedIn" required />
      </label>

      <label>
        Resume link
        <input id="resume" type="url" placeholder="https://..." required />
      </label>

      <label class="checkbox">
        <input id="useTinyUrl" type="checkbox" checked />
        Shorten resume URL with TinyURL
      </label>

      <div class="actions">
        <button type="submit" id="generateCopyBtn">Generate + Copy</button>
      </div>
    </form>

    <label class="output-label" for="output">Generated message</label>
    <textarea id="output" readonly placeholder="Generated message will appear here..."></textarea>
    <p id="status" class="status" aria-live="polite"></p>

    <section class="history-section" aria-label="Message history">
      <div class="history-header">
        <h2>History</h2>
        <input id="historySearch" type="text" placeholder="Search by company or role" aria-label="Search history" />
      </div>
      <ul id="historyList" class="history-list"></ul>
      <div class="history-controls">
        <button type="button" id="prevPageBtn" class="secondary-btn">Previous</button>
        <span id="pageInfo" class="page-info">Page 1 of 1</span>
        <button type="button" id="nextPageBtn" class="secondary-btn">Next</button>
      </div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
