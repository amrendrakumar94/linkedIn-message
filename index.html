<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Link Shortener</title>
</head>
<body>
    <h1>Resume Link Shortener</h1>
    <form>
        <label for="tinyurl-checkbox">
            <input type="checkbox" id="tinyurl-checkbox" name="tinyurl-checkbox">
            Use TinyURL for shortening resume links
        </label>
    </form>
    <script>
        // JavaScript code to handle checkbox
        const checkbox = document.getElementById('tinyurl-checkbox');
        checkbox.addEventListener('change', function() {
            if (this.checked) {
                console.log('TinyURL will be used for shortening links.');
            } else {
                console.log('TinyURL will not be used.');
            }
        });
    </script>
</body>
</html>
